<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weather Report by Tanmay</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.8s ease;
  background-size: cover;
  background-position: center;
  background-color: #222;
}

/* 🌟 Glass UI */
.container {
  width: 360px;
  padding: 30px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.5);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  text-align: center;
  color: white;
}

h1 {
  margin-bottom: 20px;
}

/* 🔍 Search */
.search {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.search input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.search button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.search button:hover {
  transform: scale(1.1);
}

/* 📍 Button */
.loc-btn {
  margin-bottom: 15px;
  padding: 10px;
  width: 100%;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  transition: 0.3s;
}

.loc-btn:hover {
  transform: scale(1.05);
}

/* 🌦 Weather */
.weather img {
  width: 100px;
}

.temp {
  font-size: 2.8rem;
}

.desc {
  font-size: 1.1rem;
}

.extra {
  font-size: 0.9rem;
  opacity: 0.8;
}

/* ⏳ Loader */
.loader {
  display: none;
  margin: 20px auto;
  border: 4px solid rgba(255,255,255,0.3);
  border-top: 4px solid white;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">
  <h1>🌤 Weather Report by Tanmay</h1>

  <div class="search">
    <input id="cityInput" placeholder="Search any city...">
    <button onclick="getWeather()">🔍</button>
  </div>

  <button class="loc-btn" onclick="getLocation()">📍 Detect My Location</button>

  <div class="loader" id="loader"></div>

  <div class="weather">
    <h2 id="city">Search a city to begin</h2>
    <img id="icon">
    <div class="temp" id="temp">--°C</div>
    <div class="desc" id="desc">--</div>
    <div class="extra" id="extra"></div>
  </div>
</div>

<script>
const apiKey = "ba33e68eda7c48afaf093613260904";

/* ⚡ Instant UI Load */
window.onload = () => {
  document.body.style.backgroundColor = "#2c3e50";
  document.body.style.backgroundImage =
    "linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1506744038136-46273834b3fb')";
};

function showLoader(show) {
  document.getElementById("loader").style.display = show ? "block" : "none";
}

/* 🌄 Background Engine */
function setBackground(condition, isDay) {
  const body = document.body;
  condition = condition.toLowerCase();

  let image = "";
  let fallbackColor = "";

  if (!isDay) {
    image = "https://images.unsplash.com/photo-1501785888041-af3ef285b470";
    fallbackColor = "#0f2027";
  }
  else if (condition.includes("clear") || condition.includes("sunny")) {
    image = "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee";
    fallbackColor = "#4facfe";
  }
  else if (condition.includes("partly")) {
    image = "https://images.unsplash.com/photo-1499346030926-9a72daac6c63";
    fallbackColor = "#a1c4fd";
  }
  else if (condition.includes("cloud")) {
    image = "https://images.unsplash.com/photo-1527766833261-b09c3163a791";
    fallbackColor = "#757f9a";
  }
  else if (condition.includes("rain") || condition.includes("drizzle")) {
    image = "https://images.unsplash.com/photo-1501696461441-7c8f6a2d8b74";
    fallbackColor = "#314755";
  }
  else {
    image = "https://images.unsplash.com/photo-1502082553048-f009c37129b9";
    fallbackColor = "#444";
  }

  body.style.backgroundColor = fallbackColor;

  const img = new Image();
  img.src = image;

  img.onload = () => {
    body.style.backgroundImage =
      `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('${image}')`;
  };

  img.onerror = () => {
    body.style.backgroundImage = "none";
  };
}

/* 🌦 Weather Fetch */
async function getWeather(city) {
  const input = document.getElementById("cityInput").value;
  const query = city || input;

  if (!query) return alert("Enter a city");

  showLoader(true);

  try {
    const res = await fetch(`http://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${query}&aqi=yes`);
    const data = await res.json();

    document.getElementById("city").innerText =
      data.location.name + ", " + data.location.country;

    document.getElementById("temp").innerText =
      data.current.temp_c + "°C";

    document.getElementById("desc").innerText =
      data.current.condition.text;

    document.getElementById("icon").src =
      data.current.condition.icon;

    document.getElementById("extra").innerText =
      "Feels like: " + data.current.feelslike_c +
      "°C | Humidity: " + data.current.humidity + "%";

    setBackground(data.current.condition.text, data.current.is_day);

  } catch {
    alert("City not found");
  }

  showLoader(false);
}

/* 📍 Location */
function getLocation() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      const coords = pos.coords.latitude + "," + pos.coords.longitude;
      getWeather(coords);
    },
    () => {
      alert("Location denied. Please search manually.");
    }
  );
}
</script>

</body>
</html>
